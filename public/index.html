<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte NTI - CIODS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #13293D;
            --bg-surface: #006494;
            --accent-1: #247BA0;
            --accent-bright: #1B98E0;
            --text-light: #E8F1F2;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-light);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* BOTÃO HOME */
        .btn-home {
            position: absolute; top: 15px; left: 15px;
            text-decoration: none; color: var(--accent-bright);
            border: 1px solid var(--accent-bright); padding: 8px 15px;
            border-radius: 20px; font-weight: bold; font-size: 0.9rem;
            transition: all 0.3s ease; z-index: 1000; background: rgba(19, 41, 61, 0.8);
        }
        .btn-home:hover { background-color: var(--accent-bright); color: var(--bg-deep); box-shadow: 0 0 10px var(--accent-bright); }

        .chat-container {
            max-width: 560px; margin: 60px auto 40px auto;
            background: var(--bg-surface); padding: 25px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--accent-1);
        }

        .bot-msg { background: var(--accent-1); padding: 12px; border-radius: 15px 15px 15px 0; margin-bottom: 10px; width: fit-content; color: white; max-width: 100%; }
        .user-msg { background: var(--accent-bright); color: var(--bg-deep); padding: 12px; border-radius: 15px 15px 0 15px; margin-bottom: 10px; margin-left: auto; width: fit-content; font-weight: 700; }

        /* Typing indicator */
        .typing { display: inline-flex; gap: 4px; padding: 14px 16px; }
        .typing span { width: 8px; height: 8px; background: #cfe8ff; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

        .btn-outline-custom { color: var(--text-light); border-color: var(--accent-bright); margin-bottom: 5px; text-align: left; }
        .btn-outline-custom:hover { background-color: var(--accent-bright); color: var(--bg-deep); }

        /* Agrupamento por categoria */
        .grupo-titulo {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
            color: var(--accent-bright); margin: 14px 0 6px 0; opacity: 0.9;
            border-bottom: 1px solid rgba(27,152,224,0.25); padding-bottom: 4px;
        }

        /* Busca */
        .busca-box { position: relative; margin-bottom: 8px; }
        .busca-box input { background-color: var(--bg-deep); border: 1px solid var(--accent-1); color: var(--text-light); padding-left: 38px; }
        .busca-box input:focus { background-color: var(--bg-deep); color: white; border-color: var(--accent-bright); box-shadow: none; }
        .busca-box input::placeholder { color: #8faab9; }
        .busca-box .ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.6; }

        .btn-nao-encontrei {
            background-color: #c0392b; color: white; border: none; font-weight: bold;
            margin-top: 15px; padding: 12px; box-shadow: 0 4px 10px rgba(192, 57, 43, 0.4);
            transition: transform 0.2s;
        }
        .btn-nao-encontrei:hover { background-color: #e74c3c; transform: scale(1.02); color: white; }

        .form-control { background-color: var(--bg-deep); border: 1px solid var(--accent-1); color: var(--text-light); }
        .form-control:focus { background-color: var(--bg-deep); color: white; border-color: var(--accent-bright); box-shadow: none; }
        .form-control::placeholder { color: #8faab9; }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer {
            margin-top: auto; text-align: center; padding: 20px;
            font-size: 0.85rem; color: var(--text-light); opacity: 0.6;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <a href="home.html" class="btn-home">🏠 Home</a>

<div class="container">
    <div class="chat-container fade-in">
        <div class="text-center mb-3">
            <h5 style="color: var(--accent-bright)">🤖 NTI - CIODS</h5>
            <small class="text-light opacity-75">Autoatendimento Inteligente</small>
        </div>

        <div id="chat-box" style="height:330px; overflow-y:auto; padding-right: 5px;">
            <div class="bot-msg">Olá! Qual o problema que você está enfrentando?</div>
        </div>

        <!-- Área de opções (menu principal dinâmico) -->
        <div id="opcoes" class="mt-3">
            <div class="busca-box">
                <span class="ico">🔍</span>
                <input type="text" id="buscaInput" class="form-control" placeholder="Buscar problema... (ex.: internet, email, lento)" oninput="filtrarBusca()">
            </div>
            <div id="menu-grupos"></div>

            <button class="btn btn-outline-secondary w-100 mt-2" onclick="mostrarFormulario('Outros')">📝 Outro Problema (do NTI)</button>
            <button class="btn btn-nao-encontrei w-100" onclick="window.location.href='externo.html'">
                🚨 NÃO ENCONTREI MEU PROBLEMA
            </button>
        </div>

        <!-- Formulário de abertura de chamado -->
        <div id="form-chamado" class="hidden mt-3 fade-in">
            <h6 class="text-info mb-3">Abrir Chamado Técnico</h6>

            <div class="row mb-2">
                <div class="col-7">
                    <input type="text" id="nome" class="form-control" placeholder="Nome Completo">
                </div>
                <div class="col-5">
                    <input type="text" id="matricula" class="form-control" placeholder="Matrícula">
                </div>
            </div>

            <select id="select-setor" class="form-control mb-2" onchange="verificarOutroSetor()">
                <option value="" disabled selected>Selecione seu Setor...</option>
                <option value="CICCE/OPERAÇÕES">CICCE/OPERAÇÕES</option>
                <option value="SALA DE CRISES">SALA DE CRISES</option>
                <option value="CALL CENTER">CALL CENTER</option>
                <option value="DESPACHO">DESPACHO</option>
                <option value="OUTROS">OUTROS (Digitar manual...)</option>
            </select>

            <input type="text" id="input-outro-setor" class="form-control mb-2 hidden" placeholder="Digite o nome do setor...">

            <input type="text" id="ramal" class="form-control mb-2" placeholder="Ramal ou telefone">

            <input type="hidden" id="assunto-pre" value="">
            <textarea id="desc" class="form-control mb-2" rows="2" placeholder="Descreva detalhes..."></textarea>

            <div class="d-flex gap-2">
                <button class="btn btn-secondary w-50" onclick="cancelar()">Voltar</button>
                <button class="btn btn-primary w-50" style="background: var(--accent-bright); border: none;" onclick="enviarChamado()">🚀 Enviar</button>
            </div>
        </div>

        <!-- Pós-chamado: opções ao usuário -->
        <div id="pos-chamado" class="hidden mt-3 text-center fade-in"></div>
    </div>
</div>

<footer>
    <strong>Desenvolvido por</strong> João Douglas Brito de Sá <strong>Félix</strong> 2026
</footer>

<script>
const box = document.getElementById('chat-box');
const opcoes = document.getElementById('opcoes');
const form = document.getElementById('form-chamado');
const posChamado = document.getElementById('pos-chamado');
let menuPrincipalHTML = "";

// --- Definição das categorias agrupadas ---
const GRUPOS = [
    { titulo: "Rede & Internet", items: [
        { id: 'internet',   label: "📶 Sem Internet (cabo)" },
        { id: 'wifi',       label: "📡 Wi-Fi" },
        { id: 'rede',       label: "📁 Pasta / Unidade de Rede" },
        { id: 'vpn',        label: "🔐 VPN / Acesso Remoto" },
        { id: 'navegador',  label: "🌐 Navegador não abre / lento" },
    ]},
    { titulo: "Hardware & Energia", items: [
        { id: 'energia',    label: "🔌 PC não liga / Energia" },
        { id: 'desliga',    label: "🔄 PC desliga sozinho" },
        { id: 'reinicia',   label: "🔁 PC reinicia sozinho" },
        { id: 'telaazul',   label: "⚠️ Tela Azul (BSOD)" },
        { id: 'monitor',    label: "🖥️ Monitor não liga / sem imagem" },
        { id: 'periferico', label: "⌨️ Mouse / Teclado" },
        { id: 'pendrive',   label: "💾 Pendrive / USB não reconhece" },
        { id: 'datashow',   label: "📽️ Data Show / Projetor" },
    ]},
    { titulo: "Sistemas & Software", items: [
        { id: 'sistema',    label: "🖥️ Sistema Institucional" },
        { id: 'email',      label: "📧 E-mail / Outlook" },
        { id: 'office',     label: "📄 Word / Excel / Office" },
        { id: 'senha',      label: "🔑 Senha / Acesso" },
        { id: 'arquivo',    label: "🗂️ Arquivo não abre" },
        { id: 'lento',      label: "🐢 Computador Lento" },
        { id: 'atualiza',   label: "⬇️ Atualização Windows" },
        { id: 'datahora',   label: "🗓️ Data / Hora errada" },
    ]},
    { titulo: "Periféricos & Outros", items: [
        { id: 'impressora', label: "🖨️ Impressora" },
        { id: 'audio',      label: "🔈 Sem Som" },
        { id: 'antivirus',  label: "🛡️ Antivírus / Alerta de segurança" },
    ]},
];

// Renderiza menu agrupado
function renderMenu() {
    let html = '';
    GRUPOS.forEach(g => {
        html += `<div class="grupo-titulo">${g.titulo}</div>`;
        html += '<div class="d-grid gap-2">';
        g.items.forEach(it => {
            html += `<button class="btn btn-outline-custom cat-btn" data-label="${it.label.toLowerCase()}" onclick="conversa('${it.id}')">${it.label}</button>`;
        });
        html += '</div>';
    });
    document.getElementById('menu-grupos').innerHTML = html;
    menuPrincipalHTML = opcoes.innerHTML;
}

window.onload = renderMenu;

function addUser(msg){ box.innerHTML += `<div class="user-msg fade-in">${msg}</div>`; }

function addBot(msg){
    box.innerHTML += `<div class="bot-msg fade-in">${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

// Typing indicator
function showTyping() {
    box.innerHTML += `<div class="bot-msg" id="typing-ind"><div class="typing"><span></span><span></span><span></span></div></div>`;
    box.scrollTop = box.scrollHeight;
}
function hideTyping() {
    const t = document.getElementById('typing-ind');
    if (t) t.remove();
}

// Filtro de busca
function filtrarBusca() {
    const q = document.getElementById('buscaInput').value.toLowerCase().trim();
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.style.display = (!q || btn.dataset.label.includes(q)) ? '' : 'none';
    });
    // Esconde título de grupo se todos os itens dele estiverem ocultos
    document.querySelectorAll('#menu-grupos > div.grupo-titulo').forEach(titulo => {
        let irmao = titulo.nextElementSibling;
        let algumVisivel = false;
        while (irmao && irmao.classList.contains('d-grid')) {
            irmao.querySelectorAll('.cat-btn').forEach(b => { if (b.style.display !== 'none') algumVisivel = true; });
            irmao = irmao.nextElementSibling;
        }
        titulo.style.display = algumVisivel ? '' : 'none';
    });
}

function voltarMenu() {
    opcoes.innerHTML = menuPrincipalHTML;
    renderMenu();
    document.getElementById('buscaInput').value = '';
    addBot("Selecione outra opção:");
}

function verificarOutroSetor() {
    const select = document.getElementById('select-setor');
    const inputOutro = document.getElementById('input-outro-setor');
    if (select.value === 'OUTROS') {
        inputOutro.classList.remove('hidden');
        inputOutro.focus();
    } else {
        inputOutro.classList.add('hidden');
        inputOutro.value = '';
    }
}

function finalizar(assunto){
    opcoes.innerHTML = `
        <div class="row g-2">
            <div class="col-12"><p class="text-white text-center mb-2">Isso resolveu?</p></div>
            <div class="col-4"><button class="btn btn-success w-100" onclick="registrarAutoResolucao('${assunto}')">✅ Sim</button></div>
            <div class="col-4"><button class="btn btn-danger w-100" onclick="mostrarFormulario('${assunto}')">❌ Não</button></div>
            <div class="col-4"><button class="btn btn-secondary w-100" onclick="voltarMenu()">↩️ Voltar</button></div>
        </div>
    `;
}

async function registrarAutoResolucao(assunto) {
    opcoes.classList.add('hidden');
    addBot("Fico feliz em ter ajudado! O caso foi registrado como solucionado.");
    try {
        await fetch('/api/ticket/auto', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ solicitante: "Usuário Web", problema: `[${assunto}] Resolvido via Chatbot` })
        });
    } catch (e) { console.error("Erro ao salvar log", e); }
    mostrarPosResolucao();
}

function mostrarPosResolucao() {
    posChamado.classList.remove('hidden');
    posChamado.innerHTML = `
        <div class="alert alert-success mb-3">🎉 Que bom! O NTI agradece.</div>
        <div class="d-flex gap-2 justify-content-center">
            <button class="btn btn-outline-light" onclick="abrirOutro()">📝 Abrir outro chamado</button>
            <a href="home.html" class="btn btn-outline-light">🏠 Finalizar</a>
        </div>
    `;
}

function abrirOutro() {
    posChamado.classList.add('hidden');
    posChamado.innerHTML = '';
    opcoes.classList.remove('hidden');
    voltarMenu();
}

function mostrarFormulario(assunto) {
    opcoes.classList.add('hidden');
    form.classList.remove('hidden');
    document.getElementById('assunto-pre').value = assunto;
    addBot(`Entendido. Preencha seus dados para abrir o chamado: <strong>${assunto}</strong>.`);
}

function cancelar() {
    form.classList.add('hidden');
    opcoes.classList.remove('hidden');
    voltarMenu();
}

// --- CONTEÚDO DO CHATBOT (categorias + soluções guiadas) ---
const SOLUCOES = {
    // Rede & Internet
    internet: { user: "Estou sem internet (cabo)", assunto: "Internet Cabeada",
        r: `1) Verifique se o cabo está conectado firmemente.<br>
             2) Veja se há luzes piscando na porta de rede (trás do PC).<br>
             3) Reinicie o computador.<br>
             4) Se nada piscar, o cabo pode estar danificado.` },
    wifi: { user: "Wi-Fi não conecta", assunto: "Wi-Fi",
        r: `1) Desligue e ligue o Wi-Fi do seu dispositivo.<br>
             2) Verifique se está na rede correta da instituição.<br>
             3) Reinicie o computador.<br>
             4) "Esquecer" a rede e conectar novamente.` },
    rede: { user: "Não acesso pasta/unidade de rede", assunto: "Pasta/Unidade de Rede",
        r: `1) Confirme se a internet está funcionando (abra um site).<br>
             2) Verifique se a unidade aparece em "Este Computador".<br>
             3) Reinicie o computador e tente novamente.<br>
             4) Pode ser permissão ou servidor indisponível.` },
    vpn: { user: "VPN / acesso remoto não conecta", assunto: "VPN/Acesso Remoto",
        r: `1) Verifique sua internet em casa (abra um site).<br>
             2) Desconecte e reconecte a VPN.<br>
             3) Reinicie o computador.<br>
             4) Se pedir senha/token, confirme se está digitando corretamente.<br><br>
             ⚠️ Se persistir, pode ser credencial expirada.` },
    navegador: { user: "Navegador não abre / lento", assunto: "Navegador",
        r: `1) Feche todas as janelas e abra novamente.<br>
             2) Limpe o cache (Ctrl + Shift + Del).<br>
             3) Teste em modo anônimo (Ctrl + Shift + N).<br>
             4) Tente outro navegador.<br>
             5) Reinicie o computador.` },

    // Hardware & Energia
    energia: { user: "PC não liga", assunto: "Energia/Elétrica",
        r: `1) Verifique se o estabilizador/filtro está ligado.<br>
             2) Teste a tomada com outro aparelho (carregador celular).<br>
             3) Verifique os cabos de força atrás da CPU.` },
    desliga: { user: "PC liga mas desliga sozinho", assunto: "Desligamento inesperado",
        r: `1) Verifique se há superaquecimento (ventoinhas funcionando?).<br>
             2) Teste outra tomada.<br>
             3) Verifique estabilizador/filtro de linha.<br>
             4) Pode ser fonte com defeito.<br><br>
             ⚠️ Não insista em ligar repetidamente.` },
    reinicia: { user: "PC reinicia sozinho", assunto: "Reinício inesperado",
        r: `1) Pode ser atualização automática do Windows — aguarde concluir.<br>
             2) Verifique temperatura (ventoinhas).<br>
             3) Anote se aparece erro azul antes de reiniciar.<br>
             4) Pode ser driver instável ou RAM com falha.` },
    telaazul: { user: "Apareceu tela azul", assunto: "Tela Azul",
        r: `1) Anote o código do erro exibido.<br>
             2) Reinicie o computador.<br>
             3) Se ocorrer novamente, pode indicar:<br>
             - Problema de memória RAM<br>
             - Driver incompatível<br>
             - HD com falha<br><br>
             ⚠️ Evite desligamentos forçados repetidos.` },
    monitor: { user: "Monitor não liga / sem imagem", assunto: "Monitor",
        r: `1) Verifique a tomada e o cabo de força.<br>
             2) Aperte o botão Power do monitor.<br>
             3) Verifique o cabo de vídeo (VGA/HDMI).<br>
             4) Teste em outra tomada.` },
    periferico: { user: "Mouse ou teclado ruim", assunto: "Periféricos",
        r: `1) Troque de porta USB.<br>
             2) Se for sem fio, troque as pilhas.<br>
             3) Reinicie o computador.` },
    pendrive: { user: "Pendrive / USB não reconhece", assunto: "Pendrive/USB",
        r: `1) Troque de porta USB (de preferência na parte de trás da CPU).<br>
             2) Teste o pendrive em outro computador.<br>
             3) Reinicie o computador.<br>
             4) Se aparecer "dispositivo não reconhecido", pode ser driver ou cabo danificado.` },
    datashow: { user: "Data show / projetor não exibe", assunto: "Data Show/Projetor",
        r: `1) Verifique se o projetor está ligado e aquecido.<br>
             2) Confirme o cabo de vídeo (HDMI/VGA) bem fixo.<br>
             3) No Windows: Win + P → selecione "Duplicar".<br>
             4) Verifique a fonte de entrada do projetor (botão Input/Source).<br>
             5) Teste outro cabo, se disponível.` },

    // Sistemas & Software
    sistema: { user: "Sistema institucional não abre", assunto: "Sistema Institucional",
        r: `1) Verifique se a internet está funcionando.<br>
             2) Tente acessar outro site para confirmar conexão.<br>
             3) Pressione Ctrl + F5 para atualizar forçado.<br>
             4) Teste outro navegador.<br>
             5) Observe se aparece mensagem de erro específica.<br><br>
             ⚠️ Pode ser instabilidade do servidor.` },
    email: { user: "E-mail / Outlook com problema", assunto: "E-mail/Outlook",
        r: `1) Verifique sua internet (abra um site).<br>
             2) Feche e abra o Outlook.<br>
             3) Se a caixa estiver cheia, apague itens grandes da "Lixeira" e "Itens Enviados".<br>
             4) Verifique se aparece "Trabalhando Offline" — desative em Enviar/Receber.<br>
             5) Teste acessar o webmail pelo navegador.` },
    office: { user: "Word/Excel não abre / pede licença", assunto: "Office/Word/Excel",
        r: `1) Feche todos os programas do Office.<br>
             2) Reinicie o computador.<br>
             3) Se pedir ativação, confirme se aparece sua conta institucional.<br>
             4) Tente abrir em "Modo de Segurança" (Ctrl + clique no ícone).<br>
             5) Pode ser licença expirada — NTI reativa.` },
    senha: { user: "Problema com senha ou acesso", assunto: "Senha / Acesso",
        r: `1) Verifique se CAPS LOCK está ativado.<br>
             2) Confirme se está digitando usuário correto.<br>
             3) Reinicie o computador e tente novamente.<br>
             4) Se bloqueado por tentativas, aguarde 15 minutos.<br><br>
             🔐 Se persistir, será necessário reset de senha pelo NTI.` },
    arquivo: { user: "Arquivo não abre", assunto: "Arquivo não abre",
        r: `1) Verifique se possui o programa adequado instalado.<br>
             2) Tente abrir em outro computador.<br>
             3) Pode estar corrompido.<br>
             4) Verifique se o arquivo foi baixado completamente.<br><br>
             📄 Se necessário, enviar cópia para análise.` },
    lento: { user: "Computador está lento", assunto: "Computador Lento",
        r: `1) Feche programas que não está utilizando.<br>
             2) Pressione Ctrl + Shift + Esc → veja se há algo consumindo muita CPU ou Memória.<br>
             3) Reinicie o computador.<br>
             4) Verifique se o Disco C: está quase cheio.<br>
             5) Se estiver lento ao iniciar, pode haver muitos programas na inicialização.<br><br>
             ⚠️ Se continuar lento, pode ser problema de HD, memória RAM ou vírus.` },
    atualiza: { user: "Windows quer atualizar / travou em atualização", assunto: "Atualização Windows",
        r: `1) Salve seus trabalhos e deixe a atualização concluir.<br>
             2) Se travar por mais de 30 min, reinicie o computador.<br>
             3) Não desligue da tomada durante atualização.<br>
             4) Em "Configurações > Windows Update" verifique pendências.` },
    datahora: { user: "Data/hora do PC está errada", assunto: "Data/Hora",
        r: `1) Clique no relógio > Ajustar data/hora.<br>
             2) Ative "Definir automaticamente".<br>
             3) Clique em "Sincronizar agora".<br>
             4) Reinicie o computador.<br><br>
             ⚠️ Se voltar a desconfigurar, pode ser bateria da placa-mãe (CMOS).` },

    // Periféricos & Outros
    impressora: { user: "Impressora não imprime", assunto: "Impressora",
        r: `1) Verifique se há papel e se está ligada.<br>
             2) Confira o cabo USB ou conexão de rede.<br>
             3) Verifique se há luzes de erro piscando na impressora.<br>
             4) Reinicie o computador.<br>
             5) Em "Impressoras e Scanners", verifique se está como padrão.` },
    audio: { user: "Computador está sem som", assunto: "Áudio",

function conversa(tipo){
    const s = SOLUCOES[tipo];
    if (!s) return;
    addUser(s.user);
    opcoes.innerHTML = '';

    showTyping();
    setTimeout(() => {
        hideTyping();
        addBot(s.r);
        addBot("Isso ajudou?");
        finalizar(s.assunto);
    }, 3000);
}

async function enviarChamado() {
    const nome = document.getElementById('nome').value.trim();
    const matricula = document.getElementById('matricula').value.trim();
    const ramal = document.getElementById('ramal').value.trim();

    const selectSetor = document.getElementById('select-setor');
    let setorReal = selectSetor.value;
    if (setorReal === 'OUTROS') {
        setorReal = document.getElementById('input-outro-setor').value.trim();
    }

    if(!nome || !setorReal || !matricula) return alert('Por favor, preencha Nome, Matrícula e selecione o Setor!');

    const assunto = document.getElementById('assunto-pre').value;
    const descExtra = document.getElementById('desc').value.trim();
    const problemaFinal = `[${assunto}] ${descExtra}`;

    try {
        const res = await fetch('/api/ticket', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ solicitante: nome, matricula: matricula, setor: setorReal, ramal: ramal, problema: problemaFinal })
        });
        const data = await res.json();

        if(res.ok && data.success) {
            form.classList.add('hidden');
            const idTicket = data.ticket ? data.ticket.id : '?';
            box.innerHTML += `<div class="bot-msg" style="background-color: #2ecc71;">✅ <strong>Chamado Criado!</strong><br>Protocolo <strong>#${idTicket}</strong>. Em breve, um analista do NTI irá atendê-lo(a).</div>`;
            box.scrollTop = box.scrollHeight;
            mostrarPosChamadoComId(idTicket);
        } else {
            alert('Erro ao comunicar com o servidor.');
        }
    } catch (e) {
        alert('Erro de conexão.');
        console.error(e);
    }
}

function mostrarPosChamadoComId(idTicket) {
    posChamado.classList.remove('hidden');
    posChamado.innerHTML = `
        <div class="alert alert-success mb-3">📝 Chamado <strong>#${idTicket}</strong> registrado com sucesso.</div>
        <div class="d-flex gap-2 justify-content-center">
            <button class="btn btn-outline-light" onclick="abrirOutro()">📝 Abrir outro chamado</button>
            <a href="home.html" class="btn btn-outline-light">🏠 Finalizar</a>
        </div>
    `;
}
