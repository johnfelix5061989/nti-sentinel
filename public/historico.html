<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico Sentinel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { 
            background-color: #13293D; 
            color: #E8F1F2; 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .card-filter { background: #1f3a52; border: 1px solid #247BA0; padding: 20px; border-radius: 10px; }
        .table-custom { background: #1f3a52; color: #fff; }
        .table-custom th { background: #006494; color: white; }
        .metric-box { background: #006494; padding: 15px; border-radius: 8px; text-align: center; }
        .btn-download { background: #27ae60; color: white; border: none; padding: 5px 15px; border-radius: 5px; text-decoration: none; font-size: 0.8rem; }
        .btn-download:hover { background: #2ecc71; color: white; }

        footer {
            margin-top: auto; 
            text-align: center; 
            padding: 20px; 
            font-size: 0.85rem; 
            color: #E8F1F2; 
            opacity: 0.5; 
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📂 Histórico & Auditoria</h2>
        <a href="gestor.html" class="btn btn-outline-light">⬅ Voltar ao Gestor</a>
    </div>

    <h5 class="text-info mb-3">🔍 Chamados Recentes (Banco de Dados)</h5>
    <div class="card-filter mb-4">
        <div class="row g-3">
            <div class="col-md-3">
                <label>Data Inicial</label>
                <input type="date" id="dataInicio" class="form-control">
            </div>
            <div class="col-md-3">
                <label>Data Final</label>
                <input type="date" id="dataFim" class="form-control">
            </div>
            <div class="col-md-3">
                <label>Status</label>
                <select id="statusFilter" class="form-select">
                    <option value="todos">Todos</option>
                    <option value="solucionado">Resolvidos</option>
                    <option value="n3">Escalados N3</option>
                    <option value="auto_solucionado">Autoatendimento</option>
                </select>
            </div>
            <div class="col-md-3">
                <label>Buscar</label>
                <input type="text" id="buscaText" class="form-control" placeholder="Nome, Matrícula...">
            </div>
        </div>
        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-primary" onclick="carregarHistorico()">🔍 Filtrar</button>
            <button class="btn btn-secondary" onclick="exportarPDF()">📄 Exportar PDF</button>
        </div>
    </div>

    <div class="table-responsive mb-5">
        <table class="table table-custom table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Data/Hora</th>
                    <th>Solicitante</th>
                    <th>Setor</th>
                    <th>Ramal/Local</th>
                    <th>Problema</th>
                    <th>Status</th>
                    <th>Analista</th>
                    <th>Solução / Parecer</th>
                </tr>
            </thead>
            <tbody id="tabelaHistorico"></tbody>
        </table>
        <p class="text-muted text-center" id="msg-sem-dados" style="display:none">Nenhum registro encontrado no filtro atual.</p>
    </div>
</div>

<footer>
    <strong>Desenvolvido por</strong> João Douglas Brito de Sá <strong>Félix</strong> 2026
</footer>

<script>
    let dadosCache = []; // Guarda dados para exportação PDF

    // Escape HTML (proteção XSS)
    function esc(s) {
        if (s == null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // Verifica autenticação antes de carregar
    (async function() {
        try {
            const res = await fetch('/auth/me');
            const data = await res.json();
            if (!data.authenticated) {
                alert('Você precisa estar logado. Redirecionando para o login...');
                window.location.href = 'gestor.html';
                return;
            }
            iniciar();
        } catch (e) {
            document.getElementById('tabelaHistorico').innerHTML =
                '<tr><td colspan="9" class="text-danger text-center">Erro de conexão com o servidor.</td></tr>';
        }
    })();

    function iniciar() {
        const hoje = new Date().toISOString().split('T')[0];
        const mesPassado = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
        document.getElementById('dataFim').value = hoje;
        document.getElementById('dataInicio').value = mesPassado;

        carregarHistorico();
    }

    // --- FUNÇÕES DE BUSCA (BANCO) ---
    async function carregarHistorico() {
        const inicio = document.getElementById('dataInicio').value;
        const fim = document.getElementById('dataFim').value;
        const status = document.getElementById('statusFilter').value;
        const busca = document.getElementById('buscaText').value;

        try {
            const res = await fetch(`/api/historico?inicio=${inicio}&fim=${fim}&status=${status}&busca=${encodeURIComponent(busca)}`);
            if (res.status === 403) {
                document.getElementById('tabelaHistorico').innerHTML =
                    '<tr><td colspan="9" class="text-danger text-center">Sessão expirada. <a href="gestor.html">Fazer login novamente</a>.</td></tr>';
                return;
            }
            const dados = await res.json();
            dadosCache = dados;

            const tbody = document.getElementById('tabelaHistorico');
            tbody.innerHTML = '';

            if(dados.length === 0) {
                document.getElementById('msg-sem-dados').style.display = 'block';
            } else {
                document.getElementById('msg-sem-dados').style.display = 'none';
                dados.forEach(t => {
                    const dataFmt = new Date(t.timestamp).toLocaleString('pt-BR');
                    const badge = t.prioridade === 'Alta' ? '<span class="badge bg-danger">Alta</span>' : '';
                    const statusBadge = t.status === 'solucionado' ? '<span class="badge bg-success">solucionado</span>'
                        : t.status === 'n3' ? '<span class="badge bg-danger">n3</span>'
                        : t.status === 'auto_solucionado' ? '<span class="badge bg-warning text-dark">auto</span>'
                        : `<span class="badge bg-secondary">${esc(t.status)}</span>`;
                    const row = `
                        <tr>
                            <td>#${esc(t.id)}</td>
                            <td>${esc(dataFmt)}</td>
                            <td>${esc(t.solicitante)} <br><small class="text-muted">${esc(t.matricula) || ''}</small></td>
                            <td>${esc(t.setor)} ${badge}</td>
                            <td>${esc(t.ramal) || '-'}</td>
                            <td>${esc(t.problema)}</td>
                            <td>${statusBadge}</td>
                            <td>${esc(t.analista) || '-'}</td>
                            <td><small>${esc(t.solucao) || '-'}</small></td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }
        } catch(e) { console.error("Erro histórico", e); }
    }

    // --- EXPORTAÇÃO PDF ---
    function exportarPDF() {
        if (dadosCache.length === 0) {
            alert('Nenhum registro para exportar. Faça uma busca primeiro.');
            return;
        }

        const inicio = document.getElementById('dataInicio').value;
        const fim = document.getElementById('dataFim').value;
        const status = document.getElementById('statusFilter').value;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4'); // landscape

        // Cabeçalho
        doc.setFillColor(19, 41, 61);
        doc.rect(0, 0, 297, 28, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(16);
        doc.setFont(undefined, 'bold');
        doc.text('NTI Sentinel - Relatório de Chamados', 14, 13);
        doc.setFontSize(9);
        doc.setFont(undefined, 'normal');
        doc.text(`Período: ${inicio} a ${fim}  |  Filtro: ${status}  |  Total: ${dadosCache.length} registros`, 14, 20);
        doc.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}  |  Usuário: ${document.title}`, 14, 25);

        // Tabela
        doc.autoTable({
            startY: 34,
            head: [['ID', 'Data/Hora', 'Solicitante', 'Setor', 'Ramal', 'Problema', 'Status', 'Analista', 'Solução']],
            body: dadosCache.map(t => [
                '#' + t.id,
                new Date(t.timestamp).toLocaleString('pt-BR'),
                t.solicitante + (t.matricula ? '\n(' + t.matricula + ')' : ''),
                t.setor + (t.prioridade === 'Alta' ? ' [ALTA]' : ''),
                t.ramal || '-',
                t.problema,
                t.status,
                t.analista || '-',
                t.solucao || '-'
            ]),
            styles: { fontSize: 7.5, cellPadding: 2, overflow: 'linebreak', valign: 'top' },
            headStyles: { fillColor: [0, 100, 148], textColor: 255, fontSize: 8, fontStyle: 'bold' },
            alternateRowStyles: { fillColor: [240, 245, 248] },
            columnStyles: {
                0: { cellWidth: 14 },
                1: { cellWidth: 28 },
                2: { cellWidth: 32 },
                3: { cellWidth: 28 },
                4: { cellWidth: 20 },
                5: { cellWidth: 42 },
                6: { cellWidth: 22 },
                7: { cellWidth: 25 },
                8: { cellWidth: 'auto' }
            },
            margin: { left: 10, right: 10 }
        });

        // Rodapé com numeração de páginas
        const paginas = doc.internal.getNumberOfPages();
        for (let i = 1; i <= paginas; i++) {
            doc.setPage(i);
            doc.setFontSize(7);
            doc.setTextColor(120, 120, 120);
            doc.text(`Página ${i} de ${paginas}`, 287, 205, { align: 'right' });
            doc.text('NTI Sentinel - CIODS', 10, 205);
        }

        doc.save(`Relatorio_NTISentinel_${inicio}_${fim}.pdf`);
    }
</script>
</body>
</html>
